name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt, clippy, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Run clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build release
        run: cargo build --release --locked

      - name: Smoke CLI
        run: |
          ./target/release/linwatch --version
          ./target/release/linwatch --check-config
          ./target/release/linwatch --json-lines --samples 1 >/tmp/linwatch.jsonl
          test -s /tmp/linwatch.jsonl
