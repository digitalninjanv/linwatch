name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create when manually dispatching"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: linwatch

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --locked"

      - name: Package archive
        run: |
          set -euo pipefail
          ARCHIVE="${BIN_NAME}-${RELEASE_TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" dist/package/
          cp README.md LICENSE install.sh dist/package/
          tar -C dist/package -czf "dist/${ARCHIVE}" .
          echo "archive_name=${ARCHIVE}" >> $GITHUB_OUTPUT
        id: package

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: dist/${{ steps.package.outputs.archive_name }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > sha256sums.txt
          cat sha256sums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/sha256sums.txt
            install.sh
          generate_release_notes: true
